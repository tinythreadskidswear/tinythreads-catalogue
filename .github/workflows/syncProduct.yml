name: Sync products.json → Supabase

on:
  workflow_dispatch:         # run manually from GitHub Actions UI only

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upsert products into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node << 'EOF'
          // No SDK — plain fetch() to Supabase REST API (no WebSocket/Realtime needed)
          const fs = require('fs');

          const SUPABASE_URL     = process.env.SUPABASE_URL;
          const SUPABASE_SERVICE_KEY = process.env.SUPABASE_SERVICE_KEY;

          async function upsertBatch(batch) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
              method: 'POST',
              headers: {
                'apikey':        SUPABASE_SERVICE_KEY,
                'Authorization': `Bearer ${SUPABASE_SERVICE_KEY}`,
                'Content-Type':  'application/json',
                'Prefer':        'resolution=merge-duplicates'  // upsert on conflict
              },
              body: JSON.stringify(batch)
            });
            if (!res.ok) {
              const err = await res.text();
              throw new Error(`Supabase error ${res.status}: ${err}`);
            }
          }

          async function main() {
            const raw      = JSON.parse(fs.readFileSync('products.json', 'utf8'));
            const products = raw.products || raw;
            const rows     = products.map(p => ({ ...p, active: p.active !== false }));

            const BATCH = 100;
            let upserted = 0;
            for (let i = 0; i < rows.length; i += BATCH) {
              await upsertBatch(rows.slice(i, i + BATCH));
              upserted += Math.min(BATCH, rows.length - i);
              console.log(`✅ Upserted ${upserted}/${rows.length} products`);
            }
            console.log(`\n✅ Sync complete — ${upserted} products in Supabase`);
          }

          main().catch(e => { console.error('❌', e.message); process.exit(1); });
          EOF
