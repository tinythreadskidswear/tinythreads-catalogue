name: Build Product Pages

on:
  workflow_dispatch:       # manual trigger only

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout supabase_branch
        uses: actions/checkout@v4
        with:
          ref: supabase_branch
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build product pages from Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          SCRIPT=$(find . -name "Supabase_OG_Page_Builder.js" -not -path "*/node_modules/*" | head -1)
          if [ -z "$SCRIPT" ]; then
            echo "❌  Supabase_OG_Page_Builder.js not found in repo"
            exit 1
          fi
          echo "✅  Found script at: $SCRIPT"
          node "$SCRIPT"

      - name: Commit and push to supabase_branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products/
          git diff --staged --quiet && echo "⏭️  No changes to commit" && exit 0
          git commit -m "chore: rebuild product pages from Supabase [skip ci]"
          git push origin supabase_branch
          echo "✅  Done — review changes on supabase_branch"
          echo "👉  Open a PR: supabase_branch → main when ready"