name: Build Product Pages

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to push generated pages to'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Show repo structure (debug)
        run: find . -name "*.js" | grep -v node_modules | grep -v ".git" | sort

      - name: Build product pages from Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Find the builder script wherever it lives in the repo
          SCRIPT=$(find . -name "OG_Page_Builder.js" -not -path "*/node_modules/*" | head -1)
          if [ -z "$SCRIPT" ]; then
            echo "❌  OG_Page_Builder.js not found in repo"
            echo "    JS files found:"
            find . -name "*.js" -not -path "*/node_modules/*"
            exit 1
          fi
          echo "✅  Found script at: $SCRIPT"
          node "$SCRIPT"

      - name: Commit and push to target branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products/
          git diff --staged --quiet && echo "⏭️  No changes to commit" && exit 0
          git commit -m "chore: rebuild product pages from Supabase [skip ci]"
          git push origin ${{ github.event.inputs.target_branch }}
          echo "✅  Pages pushed to branch: ${{ github.event.inputs.target_branch }}"
          echo "👉  Review changes, then open a PR to merge into main"
